name: Deploy to Vercel

on:
  push:
    branches:
      - master

jobs:
  deploy-api:
    name: Deploy API (Backend)
    runs-on: ubuntu-latest
    # Only runs when files in apps/api or packages/ change
    if: |
      contains(github.event.head_commit.modified, 'apps/api/') ||
      contains(github.event.head_commit.modified, 'packages/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information (API)
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}

      - name: Build API with Turbo
        run: npx turbo run build --filter=api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Vercel Artifacts (API)
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy API to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}

      - name: Run Database Migrations
        run: cd apps/api && npm run migration:run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-web:
    name: Deploy Web (Frontend)
    runs-on: ubuntu-latest
    # Only runs when files in apps/web or packages/ change
    if: |
      contains(github.event.head_commit.modified, 'apps/web/') ||
      contains(github.event.head_commit.modified, 'packages/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information (Web)
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

      - name: Build Web with Turbo
        run: npx turbo run build --filter=web

      - name: Build Vercel Artifacts (Web)
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          API_URL: ${{ secrets.API_URL }}

      - name: Deploy Web to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
